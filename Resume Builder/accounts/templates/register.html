<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #667eea,
                #764ba2
            );
        }

        .register-container{
            width:400px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            color:#4e54c8;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:15px;
            margin-bottom:20px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#667eea;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#4e54c8;
        }

        a{
            color:#667eea;
            text-decoration:none;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="register-container">

    <h1>Create Account</h1>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <input
            type="email"
            name="email"
            placeholder="Email"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a href="/login/">
        Already have an account?
    </a>

</div>

</body>
</html>
