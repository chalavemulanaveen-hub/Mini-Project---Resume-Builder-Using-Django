<!DOCTYPE html>
<html>
<head>
    <title>Resume Builder Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                135deg,
                #667eea,
                #764ba2
            );
        }

        .login-container{
            width:400px;
            background:#ffffff;
            padding:40px;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,0.3);
            text-align:center;
        }

        .logo{
            font-size:35px;
            margin-bottom:10px;
        }

        h1{
            color:#4e54c8;
            margin-bottom:10px;
        }

        p{
            color:gray;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:15px;
            margin-bottom:20px;
            border:1px solid #ddd;
            border-radius:10px;
            font-size:16px;
        }

        input:focus{
            outline:none;
            border:2px solid #667eea;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#667eea;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#4e54c8;
        }

        .register-link{
            margin-top:20px;
        }

        .register-link a{
            color:#667eea;
            text-decoration:none;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="login-container">

    <div class="logo">📄</div>

    <h1>Resume Builder</h1>

    <p>Login to continue</p>

    <form method="POST">

        {% csrf_token %}

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="register-link">

        New user?

        <a href="/register/">
            Create Account
        </a>

    </div>

</div>

</body>
</html>
