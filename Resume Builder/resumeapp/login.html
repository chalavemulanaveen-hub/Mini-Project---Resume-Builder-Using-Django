<!DOCTYPE html>
<html>
<head>
    <title>Login - Resume Builder</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#4e54c8,#8f94fb);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            background:white;
            width:350px;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            color:#4e54c8;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#4e54c8;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#3439a5;
        }

        a{
            color:#4e54c8;
            text-decoration:none;
            font-weight:bold;
        }

        p{
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="login-box">

    <h1>Resume Builder</h1>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        New User?
        <a href="/register/">
            Register Here
        </a>
    </p>

</div>

</body>
</html>
