<!DOCTYPE html>
<html>
<head>
    <title>Resume Preview</title>
</head>
<body>

    <h1>{{ resume.name }}</h1>

    <h3>{{ resume.title }}</h3>

    <p><strong>Email:</strong> {{ resume.email }}</p>

    <p><strong>Phone:</strong> {{ resume.phone }}</p>

    <p><strong>Address:</strong> {{ resume.address }}</p>

    <hr>

    <h2>Profile</h2>
    <p>{{ resume.summary }}</p>

    <h2>Education</h2>
    <p>{{ resume.education }}</p>

    <h2>Experience</h2>
    <p>{{ resume.experience }}</p>

    <h2>Skills</h2>
    <p>{{ resume.skills }}</p>

</body>
</html>
