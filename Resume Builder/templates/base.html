<!DOCTYPE html>
<html>
<head>
    <title>Resume Builder</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f6f9;
        }

        .navbar {
            background: #2c3e50;
            padding: 15px;
            color: white;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 30px;
        }

        a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        .btn {
            padding: 10px 15px;
            background: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background: #2980b9;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>Resume Builder</h2>

    {% if user.is_authenticated %}
        <a href="/">Home</a>
        <a href="/form/">Create Resume</a>
        <a href="/logout/">Logout</a>
    {% else %}
        <a href="/login/">Login</a>
        <a href="/register/">Register</a>
    {% endif %}
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
